  var lbl = score <= 25 ? '低风险' : score <= 60 ? '中等风险' : '高风险';

  var chips = [];
  if (d) {
    // IP 用途类型
    if (d.usageType) chips.push('<span class="risk-chip ' + (score<=25?'safe':score<=60?'warn':'danger') + '">' + d.usageType + '</span>');
    // Tor 节点
    if (d.isTor) chips.push('<span class="risk-chip danger">Tor 节点</span>');
    // 白名单
    if (d.isWhitelisted) chips.push('<span class="risk-chip safe">白名单 IP</span>');
    // 举报次数
    if (d.totalReports > 0) chips.push('<span class="risk-chip ' + (d.totalReports > 10 ? 'danger' : 'warn') + '">被举报 ' + d.totalReports + ' 次</span>');
    else chips.push('<span class="risk-chip safe">无举报记录</span>');
    chips.push('<span class="risk-chip ' + (score<=25?'safe':score<=60?'warn':'danger') + '">' + lbl + '</span>');

    rows += '<div class="geo-rows" style="margin-top:14px">';

/* =====================================================
   复制 IP
   降级链：clipboard API → execCommand（微信/QQ WebView）
===================================================== */
function copyIP() {
  if (!currentIP) return;
  var btn = document.getElementById('copyBtn');

  function onSuccess() {
    if (btn) btn.textContent = '已复制 ✓';
    setTimeout(function() { if (btn) btn.textContent = '复制 IP'; }, 2000);
  }

  function onFail() {
    if (btn) btn.textContent = '请手动复制';
    setTimeout(function() { if (btn) btn.textContent = '复制 IP'; }, 2000);
  }

  /* execCommand 降级（适用于微信/QQ/UC WebView） */
  function execCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;pointer-events:none';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    try {
      var ok = document.execCommand('copy');
      ok ? onSuccess() : onFail();
    } catch (e) {
      onFail();
    }
    document.body.removeChild(ta);
  }

  if (typeof navigator !== 'undefined' && navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(currentIP).then(onSuccess, function() {
      execCopy(currentIP); /* clipboard 拒绝（非 HTTPS / WebView 沙箱）时降级 */
    });
  } else {
    execCopy(currentIP);
  }
}

/* =====================================================
   主查询
   降级链：fetch → XMLHttpRequest（极少数不支持 fetch 的安卓 4.x WebView）
===================================================== */
function httpGet(url, onDone, onError, timeout) {
  /* 优先 fetch */
  if (typeof fetch === 'function') {
    var ctrl;
    var timer;
    if (typeof AbortController === 'function') {
      ctrl = new AbortController();
      timer = setTimeout(function() { ctrl.abort(); }, timeout || 8000);
    }
    fetch(url, ctrl ? { signal: ctrl.signal } : {})
      .then(function(r) {
        if (timer) clearTimeout(timer);
        return r.json();
      })
      .then(onDone)
      .catch(function(e) {
        if (timer) clearTimeout(timer);
        onError(e);
      });
    return;
  }

  /* XHR 降级 */
  var xhr = new XMLHttpRequest();
  xhr.open('GET', url, true);
  xhr.timeout = timeout || 8000;
  xhr.onload = function() {
    try {
      var d = JSON.parse(xhr.responseText);
      onDone(d);
    } catch (e) {
      onError(e);
    }
  };
  xhr.onerror = xhr.ontimeout = function() { onError(new Error('network')); };
  xhr.send();
}

function renderMap(lat, lng, label) {
  if (!lat || !lng) {
    setHtml('mapContent', '<div style="color:var(--text3);font-size:13px;padding:16px 0">暂无坐标数据</div>');
    return;
  }

  setHtml('mapContent', '<div id="ipMap"></div>');

  /* 等 DOM 插入后再初始化，避免 Leaflet 拿不到容器尺寸 */
  setTimeout(function() {
    if (typeof L === 'undefined') return;

    /* 销毁旧地图实例（切换 IP 时重建） */
    if (_map) {
      _map.remove();
      _map = null;
      _marker = null;
    }

    _map = L.map('ipMap', {
      center: [lat, lng],
      zoom: 10,
      zoomControl: true,
      scrollWheelZoom: false,   /* 避免页面滚动被地图劫持 */
      attributionControl: true
    });

    /* 苹果风格浅色瓦片 —— CartoDB Positron，无需 Key */
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
      subdomains: 'abcd',
      maxZoom: 19
    }).addTo(_map);

    /* 自定义蓝色圆点 marker，匹配苹果设计语言 */
    var dotIcon = L.divIcon({
      className: '',
      html: '<div style="width:16px;height:16px;border-radius:50%;background:#0071e3;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,113,227,0.5)"></div>',
      iconSize: [16, 16],
      iconAnchor: [8, 8]
    });

    _marker = L.marker([lat, lng], { icon: dotIcon }).addTo(_map);
    if (label) {
      _marker.bindPopup(
        '<div style="font-family:\'DM Sans\',sans-serif;font-size:13px;font-weight:500;color:#1d1d1f;white-space:nowrap">' + label + '</div>',
        { closeButton: false, offset: [0, -4] }
      ).openPopup();
    }
  }, 50);
}

function runCheck() {
  var q = (document.getElementById('ipInput').value || '').replace(/^\s+|\s+$/g, '');
  currentIP = '';
  showSkeletons();

  function queryIPDetail(ip) {
    var url = ip
      ? 'https://ipapi.co/' + encodeURIComponent(ip) + '/json/'
      : 'https://ipapi.co/json/';

    httpGet(url, function(d) {
      if (d.error) {
        setText('ipDisplay', '无效地址');
        setHtml('ipTags', '<div class="chip" style="color:#ff3b30">' + (d.reason || '查询失败') + '</div>');
        return;
      }
      currentIP = d.ip;
      renderIPMeta(d);
      renderGeo(d);
      renderASN(d);
      renderMap(d.latitude, d.longitude, (d.city ? d.city + ', ' : '') + (d.country_name || ''));
      setTimeout(renderLatency, 360);

      /* 请求 AbuseIPDB 真实数据 */
      var abuseUrl = 'https://666msapi.haoxzhang.workers.dev/check?ip=' + encodeURIComponent(d.ip);
      httpGet(abuseUrl, function(abuse) {
        renderRisk(abuse);
        renderBL(abuse);
      }, function() {
        /* AbuseIPDB 请求失败降级显示空数据 */
        renderRisk(null);
        renderBL(null);
      }, 8000);

    }, function() {
      setText('ipDisplay', '请求失败');
      setHtml('ipTags', '<div class="chip" style="color:#ff3b30">网络错误 — 请检查连接后重试</div>');
      setHtml('geoContent',  '<div style="color:#ff3b30;font-size:13px;padding:8px 0">ipapi.co 暂时无法访问</div>');
      setHtml('asnContent',  '');
      setHtml('riskContent', '');
      setHtml('blContent',   '');
      setHtml('latContent',  '');
    });
  }

  /* 用户输入了具体 IP，直接查 */
  if (q) {
    queryIPDetail(q);
    return;
  }

  /* 没有输入，先从 Worker 获取真实 IP（IPv4 优先），再查详情 */
  httpGet('https://666msapi.haoxzhang.workers.dev/', function(data) {
    queryIPDetail(data.ip || '');
  }, function() {
    /* Worker 请求失败则降级，直接让 ipapi.co 自己判断 */
    queryIPDetail('');
  }, 5000);
}

/* 回车触发 */
document.getElementById('ipInput').addEventListener('keydown', function(e) {
  var key = e.key || e.keyCode;
  if (key === 'Enter' || key === 13) runCheck();
});

/* 页面加载后自动检测 */
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', runCheck);
} else {
  runCheck();
}
</script>
</body>
</html>
